# bwa-mem4's MSRV is rust 1.96 (workspace `rust-version`). Bioconda's global pin selects rust 1.95
# on some platforms (osx-64 in particular), where `{{ compiler('rust') }}` would then fail with
# "rustc 1.95.0 is not supported ... requires rustc 1.96". conda-forge ships 1.96.x on every
# platform we build, so pin the compiler up to satisfy the MSRV uniformly.
rust_compiler_version:
  - 1.96.1
