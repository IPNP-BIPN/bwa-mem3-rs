{% set version = "4.0.0" %}

# Bioconda recipe for bwa-mem4.
#
# Submission (this file is NOT auto-submitted; bioconda-recipes is a third-party repo with its own
# review):
#   1. This recipe builds from the GitHub release SOURCE tarball, so it needs the v4.0.0 release to
#      exist. Fill `sha256` below with the value from `packaging/bioconda/SHA256` (generated by the
#      release, see that file) or `curl -sL <url> | shasum -a 256`.
#   2. Fork github.com/bioconda/bioconda-recipes, copy this file to recipes/bwa-mem4/meta.yaml and
#      build.sh to recipes/bwa-mem4/build.sh, open a PR. The @BiocondaBot builds and lints it; a
#      maintainer merges. The package then appears on the bioconda channel automatically.

package:
  name: bwa-mem4
  version: {{ version }}

source:
  url: https://github.com/IPNP-BIPN/bwa-mem4/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 4d9d2529cf3d7ac47faf42c8558378b51cee5af3013b4397dbc92a3f43a39328

build:
  number: 0
  skip: True  # [win]
  # bwa-mem4 chooses its SIMD kernels (NEON / AVX2) at runtime, so a single generic build runs on
  # every CPU of the target arch; no -C target-cpu=native (that would ship SIGILL to older CPUs).
  run_exports:
    - {{ pin_subpackage('bwa-mem4', max_pin='x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}          # hts-sys compiles vendored htslib
    - {{ compiler('rust') }}
    - make
    - pkg-config
    - clangdev                       # libclang, for hts-sys' bindgen
  host:
    - zlib
    - bzip2
    - xz
    - libdeflate
  run:
    - zlib
    - bzip2
    - xz
    - libdeflate

test:
  commands:
    - bwa-mem4 version
    - bwa-mem4 mem 2>&1 | grep -q "Usage"

about:
  home: https://github.com/IPNP-BIPN/bwa-mem4
  license: MIT
  license_file: LICENSE
  summary: "Byte-identical Rust reimplementation of bwa-mem2 2.3, with lower resident memory"
  description: |
    bwa-mem4 aligns short reads to a reference and produces SAM/BAM/CRAM that is byte-identical to
    bwa-mem2 2.3, verified on a real 32.9x human WGS. It reads the same index format, takes the same
    `mem` command line, and peaks at ~11 GB of RAM on hg38 versus bwa-mem2's ~17 GB. SIMD kernels
    (NEON on arm64, AVX2 on x86_64) are chosen at runtime.
  dev_url: https://github.com/IPNP-BIPN/bwa-mem4

extra:
  recipe-maintainers:
    - IPNP-BIPN
