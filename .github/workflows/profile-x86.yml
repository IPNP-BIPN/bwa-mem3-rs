# x86_64 PROFILING (evidence-gathering, not a gate). The bench-x86 decomposition proved the x86
# gap vs the fork is NOT codegen (popcnt / AVX2 / x86-64-v3 recover 0-3%), so it is structural /
# memory-latency-bound. This job locates WHERE the time goes: perf top-symbols on bwa-mem4 vs the
# fork, plus bwa-mem4's own FM-index cache-line traffic (BWA4_TRAFFIC) and get_sa share
# (BWA4_CHAIN_TIME). Manual dispatch only.
name: profile-x86

on:
  workflow_dispatch:
    inputs:
      read_pairs:
        description: "Read pairs to simulate"
        default: "1000000"
        required: false

concurrency:
  group: profile-x86-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUSTFLAGS: ""
  CARGO_TERM_COLOR: always

jobs:
  profile:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v7

      - name: Log CPU + perf availability
        shell: bash
        run: |
          echo "model: $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2-)"
          echo -n "simd: "; grep -o -m1 -E 'avx2|avx512bw|avx512f' /proc/cpuinfo | sort -u | tr '\n' ' '; echo
          echo "nproc: $(nproc)"
          echo "perf_event_paranoid: $(cat /proc/sys/kernel/perf_event_paranoid 2>/dev/null || echo '?')"
          sudo sysctl -w kernel.perf_event_paranoid=1 2>/dev/null || true
          which perf || sudo apt-get -y install linux-tools-common "linux-tools-$(uname -r)" 2>/dev/null || sudo apt-get -y install linux-tools-generic || true
          perf --version || echo "perf UNAVAILABLE (will rely on in-binary instrumentation)"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.1"
      - uses: Swatinem/rust-cache@v2

      - name: Install bwa-mem2 + fork + wgsim + samtools
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: bench
          condarc: |
            channels:
              - conda-forge
              - bioconda
          create-args: >-
            bwa-mem2
            bwa-mem3
            wgsim
            samtools
          init-shell: bash

      - name: Build bwa-mem4 (release, with frame pointers for perf)
        shell: bash
        # force-frame-pointers keeps perf's call stacks readable without changing output bytes.
        run: RUSTFLAGS="-C force-frame-pointers=yes" cargo build --release -p bwa-mem4

      - name: Prep reference + reads (chr21)
        run: |
          mkdir -p work && cd work
          url="https://ftp.ensembl.org/pub/release-110/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.chromosome.21.fa.gz"
          curl -fsSL --retry 3 "$url" -o chr21.fa.gz && gunzip -f chr21.fa.gz
          bwa-mem2 index chr21.fa
          n="${{ github.event.inputs.read_pairs || '1000000' }}"
          wgsim -S 11 -N "$n" -1 150 -2 150 chr21.fa r1.fq r2.fq > /dev/null
          echo "simulated $n pairs"

      - name: bwa-mem4 in-binary instrumentation (traffic + get_sa share)
        run: |
          cd work
          M4=../target/release/bwa-mem4
          T="$(nproc)"; [ "$T" -gt 8 ] && T=8
          echo "== BWA4_TRAFFIC (FM-index cache-line traffic, single thread for clean per-op numbers) =="
          BWA4_TRAFFIC=1 $M4 mem -t 1 chr21.fa r1.fq r2.fq > /dev/null 2>traffic.txt || true
          grep '\[traffic\]' traffic.txt || tail -5 traffic.txt
          echo "== BWA4_CHAIN_TIME (get_sa_batch share of chaining) =="
          BWA4_CHAIN_TIME=1 $M4 mem -t "$T" chr21.fa r1.fq r2.fq > /dev/null 2>chain.txt || true
          grep -iE 'chain|get_sa|sa ' chain.txt | head || tail -5 chain.txt

      - name: perf top symbols — bwa-mem4 vs fork
        run: |
          cd work
          T="$(nproc)"; [ "$T" -gt 8 ] && T=8
          M4=../target/release/bwa-mem4
          prof() {
            local label="$1"; shift
            echo "==================== perf: $label ===================="
            if perf record -F 999 -g --call-graph fp -o "p_$label.data" -- "$@" chr21.fa r1.fq r2.fq >/dev/null 2>/dev/null; then
              echo "-- top self-time symbols --"
              perf report -i "p_$label.data" --stdio --sort=overhead -n 2>/dev/null | grep -vE '^\s*#|^\s*$' | head -25
            elif perf stat -d -- "$@" chr21.fa r1.fq r2.fq >/dev/null 2>"stat_$label.txt"; then
              echo "-- perf record blocked; perf stat instead --"; cat "stat_$label.txt"
            else
              echo "perf unavailable for $label"
            fi
          }
          prof mem4 $M4 mem -t "$T"
          prof fork bwa-mem3 mem -t "$T"
          echo "DONE"
