name: CI

# A commit on a PR branch used to trigger this workflow TWICE, once for the push and once for the
# pull_request, running an identical matrix both times. Restricting `push` to the long-lived
# branches removes that duplication with no loss of coverage: a PR still runs everything, once.
on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Overrides `.cargo/config.toml`'s `-C target-cpu=native` (an env RUSTFLAGS replaces the config
  # value entirely). On cloud VMs LLVM's host detection can name a CPU whose features the
  # hypervisor masks off, and the compiler then emits instructions the host refuses: this crashed
  # clippy-driver with SIGILL on ubuntu-22.04 while the identical tree passed elsewhere. The SIMD
  # kernels are dispatched at runtime, not by target-cpu, so nothing is lost.
  RUSTFLAGS: ""
  # Matches rust-toolchain.toml. Cargo.toml declares rust-version = "1.96" as the MSRV.
  RUST_TOOLCHAIN: "1.96.1"

jobs:
  # Picks which targets to build, because macOS runners bill at 10x on a private repo and that
  # multiplier, not their duration, is the whole cost. Measured on one run of the old matrix:
  # macos-15-intel 2.9 min -> 29 billed, macos-14 1.5 min -> 15 billed, the two Linux jobs 2.2 min
  # -> 2 billed. So 96% of the bill came from two jobs that were not even the slowest.
  #
  # ISA coverage does NOT depend on macOS: ubuntu-24.04-arm compiles and runs the NEON kernels, and
  # ubuntu-22.04 the AVX2 ones, so both SIMD paths are exercised on every pull request. What the
  # macOS runners add is the OS itself (Apple's linker, its libc, the vendored htslib build), which
  # is worth checking before code reaches a long-lived branch rather than on every intermediate
  # commit of every topic branch.
  setup:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        run: |
          set -euo pipefail
          LINUX='{"os":"ubuntu-22.04","target_id":"linux-x86_64"},{"os":"ubuntu-24.04-arm","target_id":"linux-aarch64"}'
          # macos-15-intel, not macos-13: the macOS 13 runners are retired and jobs sit queued
          # indefinitely rather than failing, which reads as a hang. This is the label
          # COMBINE-lab/salmon uses for Intel macOS.
          MACOS='{"os":"macos-14","target_id":"macos-arm64"},{"os":"macos-15-intel","target_id":"macos-x86_64"}'
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "matrix=[$LINUX,$MACOS]" >> "$GITHUB_OUTPUT"
            echo "full matrix (push to a long-lived branch, or manual run)"
          else
            echo "matrix=[$LINUX]" >> "$GITHUB_OUTPUT"
            echo "linux-only matrix (pull request); macOS runs when this lands on dev"
          fi

  build-test:
    needs: setup
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # `-D warnings` is meaningful because Cargo.toml carries an explicit allow-list of the lints
      # the tree does not yet satisfy. A NEW lint of any other kind fails the build.
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --workspace --release

      # Includes the index byte-identity test, which rebuilds the index for testdata/tiny and
      # compares all five files against the bwa-mem2 output committed alongside it.
      - name: Test (release)
        run: cargo test --workspace --release
