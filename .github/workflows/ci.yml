name: CI

# A commit on a PR branch used to trigger this workflow TWICE, once for the push and once for the
# pull_request, running an identical matrix both times. Restricting `push` to the long-lived
# branches removes that duplication with no loss of coverage: a PR still runs everything, once.
#
# The weekly run exists because `main` is otherwise a blind spot. It only builds when something is
# pushed to it, and it only receives fixes at release time, so an infrastructure break can sit
# there unseen for weeks. That is not hypothetical: `main` spent an afternoon red from a SIGILL
# that had already been fixed on `dev`, and nothing said so. On a schedule this workflow builds
# `main`, not the default branch, because `dev` is already covered by every pull request.
# Cadence and slot follow FelixKrueger/TrimGalore.
on:
  push:
    branches:
      - main
      - dev
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Overrides `.cargo/config.toml`'s `-C target-cpu=native` (an env RUSTFLAGS replaces the config
  # value entirely). On cloud VMs LLVM's host detection can name a CPU whose features the
  # hypervisor masks off, and the compiler then emits instructions the host refuses: this crashed
  # clippy-driver with SIGILL on ubuntu-22.04 while the identical tree passed elsewhere. The SIMD
  # kernels are dispatched at runtime, not by target-cpu, so nothing is lost.
  RUSTFLAGS: ""
  # Matches rust-toolchain.toml. Cargo.toml declares rust-version = "1.96" as the MSRV.
  RUST_TOOLCHAIN: "1.96.1"

jobs:
  build-test:
    # Every event builds all four targets. The matrix was briefly trimmed on pull requests to cut
    # the bill while the repository was private, where macOS runners bill at roughly 10x. The repo
    # is public now and standard runners are free, so that trade no longer buys anything and the
    # coverage is worth more than the queue time.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 exercises the AVX2 kernels, aarch64 the NEON ones; both SIMD paths are therefore
          # covered on Linux alone. macOS adds the operating system: Apple's linker, its libc, and
          # the vendored htslib C build.
          - os: ubuntu-22.04
            target_id: linux-x86_64
          - os: ubuntu-24.04-arm
            target_id: linux-aarch64
          # The NEWEST macOS on purpose, the opposite of what release.yml builds on. Here the goal
          # is to learn early that the current OS broke something; there it is to give users the
          # widest floor. macos-26 is arm64, macos-26-intel its x86_64 sibling.
          - os: macos-26
            target_id: macos-arm64
          - os: macos-26-intel
            target_id: macos-x86_64
    steps:
      - uses: actions/checkout@v7
        with:
          # Scheduled runs target `main`; every other event uses its own ref. `main` is the branch
          # nothing else watches.
          ref: ${{ github.event_name == 'schedule' && 'main' || '' }}

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # `-D warnings` is meaningful because Cargo.toml carries an explicit allow-list of the lints
      # the tree does not yet satisfy. A NEW lint of any other kind fails the build.
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --workspace --release

      # Includes the index byte-identity test, which rebuilds the index for testdata/tiny and
      # compares all five files against the bwa-mem2 output committed alongside it.
      - name: Test (release)
        run: cargo test --workspace --release
