name: Parity

# The gate that actually protects this project. `cargo test` would have caught NONE of the four
# byte-identity divergences found on 2026-07-18: they lived in the `-N` and `-w` option paths and
# past 2^23 read pairs, places no unit test looks. This job runs both aligners on the same input
# and compares SAM records byte for byte, which is the only check that can see such a bug.
#
# Proven to have teeth: run scripts/opt_parity.sh against a pre-fix binary and it goes red on
# `-N 1` and `-w 1` even on the small fixture used here.

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.96.1"
  # Pinned deliberately. bwa-mem2 is the oracle, so an upstream release must be an explicit,
  # reviewed bump here rather than something that silently turns CI red one morning.
  BWA_MEM2_VERSION: "2.3"

jobs:
  option-parity:
    # x86_64 Linux only: upstream ships a prebuilt binary for that target and no other, and
    # building bwa-mem2 from source in CI would add several minutes for no extra coverage of OUR
    # code. Note this also means the comparison runs against our AVX2 path, not NEON.
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Fetch bwa-mem2 ${{ env.BWA_MEM2_VERSION }} (the oracle)
        run: |
          set -euo pipefail
          V="${BWA_MEM2_VERSION}"
          curl -fsSL -o bwa-mem2.tar.bz2 \
            "https://github.com/bwa-mem2/bwa-mem2/releases/download/v${V}/bwa-mem2-${V}_x64-linux.tar.bz2"
          tar xjf bwa-mem2.tar.bz2
          echo "$PWD/bwa-mem2-${V}_x64-linux" >> "$GITHUB_PATH"

      - name: Confirm the oracle runs and is the pinned version
        run: |
          bwa-mem2 version
          test "$(bwa-mem2 version 2>&1 | head -1)" = "${BWA_MEM2_VERSION}"

      - name: Build
        run: cargo build --release

      # testdata/tiny ships tiny.fa together with the five index files bwa-mem2 itself produced,
      # so both aligners read the same on-disk index and no indexing step is needed here. The
      # index build is covered separately by the byte-identity test in `cargo test`.
      - name: Generate deterministic reads
        run: |
          python3 scripts/make_test_reads.py testdata/tiny/tiny.fa /tmp/ci --n 8000
          wc -l /tmp/ci_1.fq /tmp/ci_2.fq

      - name: Option parity vs bwa-mem2 (49 cases)
        env:
          IDX: testdata/tiny/tiny.fa
          R1: /tmp/ci_1.fq
          R2: /tmp/ci_2.fq
        run: |
          set -o pipefail
          bash scripts/opt_parity.sh ./target/release/bwa-mem3 | tee /tmp/parity.log
          # The script always exits 0 so the full report is printed; the pass/fail decision is here.
          grep -q "0 failed" /tmp/parity.log

      - name: Upload the report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: parity-report
          path: /tmp/parity.log
