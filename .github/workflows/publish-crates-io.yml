name: Publish to crates.io

# Runs after a successful Release, the way COMBINE-lab/oarfish chains its publish.
#
# Publishing to crates.io is PERMANENT. A version can be yanked but never deleted, and a name is
# reserved forever. So this workflow refuses to guess: it publishes only after the Release workflow
# has already proven, on all four targets, that the binaries rebuild the committed index byte for
# byte. If that gate did not pass, nothing reaches the registry.
#
# The workspace publishes as ten crates, all under our own `bwa-mem4` prefix. The libraries are
# NOT called `bwa-core`, `bwa-mem` and so on, even though those names are free: `bwa-mem` in
# particular is the name of Heng Li's algorithm, and taking it here would deny it to the upstream
# ecosystem forever. The Rust-facing library names are unchanged, so no source file cares.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package and verify every crate without uploading anything"
        type: boolean
        default: true

permissions:
  contents: read

# Never two publishes at once, and never cancel one in flight: a half-published workspace leaves
# the registry with crates whose dependencies do not exist yet.
concurrency:
  group: publish-crates-io
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.96.1"
  # Same reasoning as the other workflows: `-C target-cpu=native` from .cargo/config.toml is a
  # SIGILL hazard on cloud VMs and buys nothing, since the SIMD kernels dispatch at runtime.
  RUSTFLAGS: ""

jobs:
  publish:
    # Only after a Release that succeeded AND came from a tag push.
    #
    # The tag test is not belt-and-braces, it is the whole guard. `release.yml` also runs on
    # pull_request (so the artifact byte-identity gate is exercised before tagging), and
    # `workflow_run` fires on ANY completion of that workflow, branch and PR runs included. Without
    # this condition a green PR would publish to crates.io, permanently, from unmerged code. It was
    # caught because publishing failed for an unrelated reason; it would not have been caught
    # otherwise. For a tag push `head_branch` carries the tag name, hence the `v` prefix test.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      # Independent of the `if` above, because a condition on event metadata and a fact about the
      # commit are different claims. This one reads the repository.
      - name: The checked-out commit must be a released tag
        if: github.event_name != 'workflow_dispatch'
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          if ! git tag --points-at HEAD | grep -qE '^v[0-9]'; then
            echo "::error::HEAD carries no v* tag; refusing to publish from an untagged commit"
            exit 1
          fi
          echo "publishing from $(git tag --points-at HEAD | grep -E '^v[0-9]' | head -1)"

      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DRY: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          # crates.io REQUIRES a User-Agent and answers 403 without one, so a bare `curl` always
          # looks like "not published": the idempotency skip would republish what already landed, and
          # the indexing wait would spin its full timeout and then declare the crate missing. Send a
          # UA on every registry probe.
          is_published() {
            [ "$(curl -s -o /dev/null -w '%{http_code}' \
                 -A "bwa-mem4-release (https://github.com/${GITHUB_REPOSITORY})" \
                 --max-time 20 "https://crates.io/api/v1/crates/$1/$2")" = "200" ]
          }
          # Dependency order, computed once and written down rather than rediscovered: a crate
          # cannot be published before everything it depends on is already on the registry.
          CRATES="bwa-mem4-core bwa-mem4-index bwa-mem4-extend bwa-mem4-neon bwa-mem4-seed \
                  bwa-mem4-chain bwa-mem4-io bwa-mem4-mem bwa-mem4 bwa-mem4-diff"

          if [ "$DRY" = "true" ]; then
            echo "DRY RUN: packaging only, nothing is uploaded"
            # `--no-verify` because the later crates cannot build against registry versions that do
            # not exist yet. This still catches the errors a dry run can catch: missing metadata,
            # files outside the package, a bad readme path.
            for c in $CRATES; do
              echo "::group::package $c"
              cargo package -p "$c" --no-verify --allow-dirty
              echo "::endgroup::"
            done
            exit 0
          fi

          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN is not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

          for c in $CRATES; do
            VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
            # Idempotent: re-running after a partial failure must not abort on the crates that
            # already made it, or the workspace stays half-published.
            if is_published "$c" "$VERSION"; then
              echo "$c $VERSION is already on crates.io, skipping"
              continue
            fi
            echo "::group::publish $c"
            # crates.io rate-limits publishing NEW crate names: a burst, then a slow refill. A ten-
            # crate workspace exhausts the burst partway and the rest 429 with an exact retry time
            # ("Please try again after <date>"). Aborting there leaves the workspace half-published,
            # so instead wait until the time crates.io names and retry the SAME crate. The `for`
            # bounds it so a genuinely stuck publish cannot loop forever.
            published=false
            for attempt in $(seq 1 30); do
              if cargo publish -p "$c" 2>/tmp/pub.err; then
                published=true
                break
              fi
              cat /tmp/pub.err
              if ! grep -q "429 Too Many Requests" /tmp/pub.err; then
                echo "::error::publish of $c failed for a non-rate-limit reason"
                exit 1
              fi
              # Parse the RFC-2822 instant crates.io tells us to wait for; fall back to 130s.
              when=$(sed -n 's/.*try again after \([^.]*\) and see.*/\1/p' /tmp/pub.err | head -1)
              target=$(date -u -d "$when" +%s 2>/dev/null || echo "")
              now=$(date -u +%s)
              if [ -n "$target" ] && [ "$target" -gt "$now" ]; then
                wait=$(( target - now + 10 ))
              else
                wait=130
              fi
              echo "$c rate-limited (attempt $attempt); waiting ${wait}s"
              sleep "$wait"
            done
            [ "$published" = true ] || { echo "::error::$c never published within the retry budget"; exit 1; }
            echo "::endgroup::"
            # crates.io indexes asynchronously; the next crate cannot resolve this one until it is
            # visible. Poll rather than sleeping a fixed guess.
            for i in $(seq 1 60); do
              if is_published "$c" "$VERSION"; then
                echo "$c $VERSION is indexed"; break
              fi
              [ "$i" = "60" ] && { echo "::error::$c never appeared in the index"; exit 1; }
              sleep 10
            done
          done
          echo "all crates published at $(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)"
